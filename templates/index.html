<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/chart.js" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🛡️ Advanced Fraud Detection</h1>
            <p>AI-Powered Real-time Transaction Analysis with 99.9% Accuracy</p>
        </header>

        <div class="card">
            <h2 class="section-title">📊 Transaction Analysis</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label>Transaction Amount ($)</label>
                    <input type="number" id="Amount" step="0.01" placeholder="0.00" value="100">
                </div>
                <div class="form-group">
                    <label>Transaction Time</label>
                    <input type="number" id="Time" placeholder="0" value="0">
                </div>
            </div>

            <button class="btn" onclick="toggleFeatures()">Advanced Features <span id="toggleIcon">▼</span></button>
            
            <div class="feature-section" id="featureSection">
                <h3 style="margin: 20px 0 10px 0; color: #94a3b8;">PCA Components (V1-V28)</h3>
                <div class="form-grid" id="vFeatures">
                    <!-- Dynamic V1-V28 inputs generated by JS -->
                </div>
            </div>

            <button id="predictBtn" class="btn" onclick="predictFraud()">🔍 Analyze Transaction</button>
        </div>

        <div id="resultSection" class="card" style="display: none;">
            <h2 class="section-title">🎯 Prediction Result</h2>
            <div id="riskDisplay" class="result-card">
                <div class="risk-gauge" id="riskGauge"></div>
                <div id="riskText" style="font-size: 2.5rem; font-weight: bold; margin: 20px 0;"></div>
                <div id="confidenceText"></div>
            </div>
        </div>

        <div class="card">
            <h2 class="section-title">📈 Transaction History</h2>
            <button class="btn" onclick="loadHistory()" style="width: auto; margin-bottom: 20px;">Refresh History</button>
            <div id="historyTable" style="overflow-x: auto;">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Confidence</th>
                            <th>Risk Score</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/app.js"></script>
</body>
</html>
